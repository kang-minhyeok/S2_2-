<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GuardHub</title>
<link rel="stylesheet" href="/css/home.css" />
</head>
<body>
	<div class="page">
		<div class="card">
			<header class="header">
				<a class="logo" href="/">가드허브</a>

				<nav class="menu">
					<a href="/news">알림/소식</a> <a href="/cases">사건조회</a> <a
						href="/notice">공지사항</a> <a href="/mypage">마이페이지</a>
				</nav>

				<div class="auth">
					<!-- 비로그인: 로그인/회원가입 -->
					<span sec:authorize="isAnonymous()"> <a href="/login">로그인</a>
						<span>/</span> <a href="/signup">회원가입</a>
					</span>

					<!-- 로그인: 로그아웃 -->
					<span sec:authorize="isAuthenticated()">
						<form action="/logout" method="post" style="display: inline;">
							<button type="submit" class="logout-btn">로그아웃</button>
						</form>
					</span>
				</div>
			</header>

			<section class="banner"></section>

			<section class="quick">
				<a class="quick-item" href="/info">정보 등록</a> <a class="quick-item"
					href="/admin">관계자용 자료</a>
			</section>

		</div>
	</div>
</body>
</html>
