<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>접근 제한</title>
	<link rel="stylesheet" href="/static/css/access-denied.css" />
</head>
<body>
<header class="top">
	<a class="logo" href="/">가드허브</a>
</header>

<main class="wrap">
	<section class="card">
		<div class="icon" aria-hidden="true">!</div>
		<h1 class="title">접근할 수 없습니다</h1>
		<p class="desc">
			관계자용 자료는 <b>관계자 계정(관리자)</b>으로 로그인한 경우에만 확인할 수 있습니다.
		</p>
		<div class="actions">
			<a class="btn btn-primary" href="/">홈으로 돌아가기</a>

			<form action="/logout" method="post">
				<button type="submit" class="btn btn-ghost">로그아웃하기</button>
			</form>
		</div>
		<p class="hint">
			관계자 계정이 필요하신가요? <a class="link" href="/signup/admin">관계자용 회원가입</a>
		</p>
	</section>
</main>
</body>
