<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>회원가입</title>
  <link rel="stylesheet" href="/css/home.css"/>
</head>
<body>
  <div style="max-width:420px; margin:80px auto;">
    <h2>회원가입</h2>

    <p th:if="${message}" th:text="${message}" style="color:#c00;"></p>

    <form method="post" action="/signupProc" th:object="${form}">
      <div style="margin:12px 0;">
        <label>아이디</label><br/>
        <input type="text" th:field="*{username}" required style="width:100%; padding:10px;"/>
      </div>

      <div style="margin:12px 0;">
        <label>비밀번호</label><br/>
        <input type="password" th:field="*{password}" required style="width:100%; padding:10px;"/>
      </div>

      <div style="margin:12px 0;">
        <label>이름</label><br/>
        <input type="text" th:field="*{name}" required style="width:100%; padding:10px;"/>
      </div>

      <button type="submit" style="width:100%; padding:12px;">가입하기</button>
    </form>

    <div style="margin-top:12px;">
      <a href="/login">이미 계정이 있으신가요? 로그인</a>
    </div>
  </div>
</body>
</html>
