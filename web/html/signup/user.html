<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>일반 회원가입</title>
	<link rel="stylesheet" href="/static/css/signup.css" />
</head>
<body>
<main class="auth">
	<a class="brand" href="/">가드허브</a>
	<section class="auth__card">
		<header class="auth__header">
			<h1 class="auth__title">일반 회원가입</h1>
			<p class="auth__subtitle">필수 정보를 입력해 주세요.</p>
		</header>

		{% if message %}
		<p class="auth__error">{{ message }}</p>
		{% endif %}

		<form class="auth__form" method="post" action="/signup/user">
			<div class="field">
				<label class="field__label" for="name">이름</label>
				<input class="field__input" id="name" name="name" type="text" required />
			</div>

			<div class="field">
				<label class="field__label" for="id">아이디</label>
				<input class="field__input" id="id" name="id" type="text" required />
			</div>

			<div class="field">
				<label class="field__label" for="password">비밀번호</label>
				<input class="field__input" id="password" name="password" type="password" required />
			</div>

			<div class="field">
				<label class="field__label" for="residentFront">주민번호 앞자리</label>
				<input class="field__input" id="residentFront" name="residentFront" type="text" placeholder="6자리 숫지" maxlength="6" required />
			</div>

			<div class="field">
				<label class="field__label" for="residentBack">주민번호 뒷자리</label>
				<input class="field__input" id="residentBack" name="residentBack" type="password" placeholder="7자리 숫자" maxlength="7" required />
			</div>

			<div class="field">
				<label class="field__label" for="phone">휴대폰 번호</label>
				<input class="field__input" id="phone" name="phone" type="tel" placeholder="010-0000-0000" required />
			</div>

			<button class="btn btn--primary" type="submit">가입하기</button>
		</form>

		<footer class="auth__footer">
			<a class="auth__link" href="/signup">유형 다시 선택</a>
		</footer>
	</section>
</main>
</body>
</html>
